---
layout: default
title: Blog
permalink: /blog/
---

<h1>Blog</h1>

{% if site.posts.size > 0 %}
  <ul class="posts">
    {% for post in site.posts %}
      <li>
        <span class="meta">{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="meta">nothing here yet.</p>
{% endif %}

<p class="back"><a href="{{ '/' | relative_url }}">&larr; back</a></p>
