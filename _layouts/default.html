<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">Bhargav Borah</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/#projects' | relative_url }}">Projects</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
      <a href="{{ '/assets/cv.pdf' | relative_url }}">CV</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    // Open external links (and the CV PDF) in a new tab.
    document.querySelectorAll('a').forEach(function (a) {
      var href = a.getAttribute('href') || '';
      var isExternal = /^https?:\/\//i.test(href) && a.hostname !== location.hostname;
      var isPdf = /\.pdf($|\?|#)/i.test(href);
      if (isExternal || isPdf) {
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
      }
    });
  </script>
</body>
</html>
